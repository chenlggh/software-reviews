# Hugo Programmatic SEO Site — Cloudflare Pages Deployment
#
# This workflow:
# 1. Checks out the repo (including git submodules for PaperMod theme)
# 2. Installs Hugo with extended features
# 3. (Optional) Runs Python script to generate pages
# 4. Builds the Hugo site
# 5. Deploys to Cloudflare Pages

name: Deploy Hugo Site to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      generate_pages:
        description: "Run page generator before build"
        type: boolean
        default: false

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive   # Fetch PaperMod theme
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.136.0"
          extended: true

      - name: Setup Python
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.generate_pages == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate pages (optional)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.generate_pages == 'true' }}
        run: |
          pip install pyyaml
          python scripts/generate_pages.py

      - name: Build Hugo site
        run: hugo --minify --environment production

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy public/ --project-name=software-reviews
