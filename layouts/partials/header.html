<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
  <link rel="canonical" href="{{ .Permalink }}">
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Summary | plainify | truncate 160 }}{{ end }}">

  {{- if site.Params.robotsNoIndex }}
    <meta name="robots" content="noindex">
  {{- end }}

  <link rel="icon" href="{{ "favicon.ico" | relURL }}">
  <link rel="apple-touch-icon" href="{{ "apple-touch-icon.png" | relURL }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  {{ $css := resources.Get "css/main.css" | minify | fingerprint }}
  <link rel="stylesheet" href="{{ $css.RelPermalink }}" crossorigin="anonymous">

  {{ if site.Params.adsense }}
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client={{ site.Params.adsense }}" crossorigin="anonymous"></script>
  {{ end }}

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": {{ site.Title }},
    "url": {{ site.BaseURL }}
  }
  </script>

  {{- /* BreadcrumbList JSON-LD below is now in breadcrumb.html partial */ -}}
</head>
