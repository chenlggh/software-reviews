        detail: "The web and desktop apps require an internet connection for most operations. Mobile app has basic offline support for viewing tasks but not editing."
        category: "features"

    ideal_for_scenarios:
      - "Cross-functional teams that need timeline views and task dependency management"
      - "Organizations managing multiple projects simultaneously with portfolio oversight"
    not_ideal_for_scenarios:
