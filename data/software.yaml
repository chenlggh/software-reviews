        category: "features"
      - summary: "Strong automation rules"
        detail: "Rules automate repetitive actions: assign tasks when status changes, move due dates, notify team members. The Business tier supports multi-step custom rules."
        category: "features"
      - summary: "Great collaboration tools"
        detail: "In-line comments, task dependencies, project status reports, and automatic progress tracking keep cross-functional teams aligned without constant status meetings."
