    name: CRM Software
    description: Customer relationship management tools for sales and marketing teams.

  - id: project-management
    name: Project Management
    description: Tools for planning, tracking, and managing projects and tasks.

  - id: invoicing
    name: Invoicing Software
    description: Billing and invoicing tools for freelancers and small businesses.

  - id: email-marketing
    name: Email Marketing
    description: Email campaign and newsletter management platforms.

  - id: accounting
    name: Accounting Software
    description: Bookkeeping and financial management tools.

industries:
  - id: real-estate
    name: Real Estate
